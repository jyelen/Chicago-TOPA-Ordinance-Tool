<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:15px;line-height:1.6}
a{color:#0F6E56;text-decoration:none}a:hover{text-decoration:underline}
.nav{background:#fff;border-bottom:1px solid #e2e0d8;position:sticky;top:0;z-index:100;padding:0 1.5rem}
.nav-inner{max-width:980px;margin:0 auto;display:flex;align-items:center}
.nav-brand{font-size:13px;font-weight:600;padding:14px 0;margin-right:1rem;white-space:nowrap}
.nav-tabs{display:flex;overflow-x:auto;flex:1}
.nav-tab{padding:14px 12px;font-size:13px;color:#666;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
.nav-tab.active{color:#0F6E56;border-bottom-color:#0F6E56;font-weight:500}
.lang-btn{padding:5px 11px;border:1px solid #ccc;border-radius:6px;font-size:12px;cursor:pointer;background:#fff;color:#555;flex-shrink:0;margin-left:.5rem}
.page{display:none;max-width:980px;margin:0 auto;padding:1.5rem}
.page.active{display:block}
.section-title{font-size:19px;font-weight:600;margin-bottom:5px}
.section-sub{font-size:13px;color:#666;margin-bottom:1.25rem}
.card{background:#fff;border:1px solid #e2e0d8;border-radius:10px;overflow:hidden;margin-bottom:.875rem}
.card-header{background:#f9f8f5;border-bottom:1px solid #e2e0d8;padding:10px 15px}
.card-header h3{font-size:13px;font-weight:600}
.card-body{padding:14px}
.btn-group{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:.875rem}
.btn-opt{padding:7px 14px;border:1px solid #d0cec6;border-radius:6px;background:#fff;font-size:13px;cursor:pointer}
.btn-opt.active{background:#0F6E56;color:#fff;border-color:#0F6E56}
.timeline{list-style:none}
.step{display:grid;grid-template-columns:38px 1fr;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;left:18px;top:40px;bottom:0;width:1px;background:#e2e0d8}
.step-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:2px}
.step-body{padding:5px 0 18px 13px}
.step-title{font-size:13px;font-weight:600;margin-bottom:2px}
.step-desc{font-size:12px;color:#555;line-height:1.5}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;margin-top:4px}
.tag-green{background:#E1F5EE;color:#085041}.tag-blue{background:#E6F1FB;color:#0C447C}
.tag-amber{background:#FAEEDA;color:#633806}.tag-red{background:#FCEBEB;color:#791F1F}
.rights-list{list-style:none}
.rights-list li{font-size:12px;color:#444;padding:7px 0;border-bottom:1px solid #f0ede8;line-height:1.5;display:flex;gap:9px;align-items:flex-start}
.rights-list li:last-child{border-bottom:none}
.rights-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:#1D9E75;flex-shrink:0;margin-top:5px}
.alert{border-radius:7px;padding:10px 14px;margin-top:.625rem;font-size:12px;line-height:1.55}
.alert-red{background:#FCEBEB;border:1px solid #F7C1C1;color:#791F1F}
.alert-green{background:#E1F5EE;border:1px solid #9FE1CB;color:#085041}
.alert-amber{background:#FAEEDA;border:1px solid #FAC775;color:#633806}
.alert-blue{background:#E6F1FB;border:1px solid #B5D4F4;color:#0C447C}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:.875rem 0}
.info-cell{background:#f9f8f5;border-radius:7px;padding:10px}
.info-cell-label{font-size:10px;color:#888;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.info-cell-val{font-size:18px;font-weight:600}
.info-cell-sub{font-size:10px;color:#888;margin-top:1px}
label{font-size:11px;color:#555;display:block;margin-bottom:3px;font-weight:500}
input[type=text],input[type=number],select{width:100%;padding:6px 9px;border:1px solid #d0cec6;border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a}
input:focus,select:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{margin-bottom:10px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.875rem}
.calc-result{background:#fff;border:1px solid #e2e0d8;border-radius:10px;padding:14px;margin-bottom:.875rem}
.calc-result h4{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f5f4f0;font-size:12px}
.result-row:last-child{border-bottom:none}
.result-row.sub{font-weight:600;font-size:12px;color:#1a1a1a}
.result-row.total{font-weight:700;font-size:13px;border-top:1.5px solid #e2e0d8;border-bottom:none;padding-top:7px;margin-top:3px}
.result-row.gap{color:#A32D2D;font-weight:700;font-size:13px;border-top:1.5px solid #e2e0d8;border-bottom:none;padding-top:7px;margin-top:3px}
.result-row.surplus{color:#0F6E56;font-weight:700;font-size:13px;border-top:1.5px solid #e2e0d8;border-bottom:none;padding-top:7px;margin-top:3px}
.result-num{font-variant-numeric:tabular-nums;font-weight:500}
.result-section{margin-bottom:.875rem}
.result-section h5{font-size:10px;font-weight:700;color:#ccc;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.divider{border:none;border-top:1px solid #e2e0d8;margin:.875rem 0}
.text-sm{font-size:11px;color:#888;line-height:1.5}
.mt-1{margin-top:.4rem}.mt-2{margin-top:.875rem}
.highlighted-box{background:#f0fdf8;border:1.5px solid #1D9E75;border-radius:8px;padding:10px 13px;margin:.625rem 0}
.hb-label{font-size:10px;font-weight:700;color:#0F6E56;text-transform:uppercase;letter-spacing:.05em}
.hb-val{font-size:20px;font-weight:700;color:#0F6E56}
.hb-sub{font-size:11px;color:#3B6D11;margin-top:1px}
.stabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.stab{padding:4px 11px;border:1px solid #d0cec6;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:#666}
.stab.active{background:#0F6E56;color:#fff;border-color:#0F6E56}
.toggle-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.toggle{position:relative;width:34px;height:18px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:#ccc;border-radius:9px;cursor:pointer;transition:.2s}
.toggle input:checked+.tog-sl{background:#1D9E75}
.tog-sl::before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.tog-sl::before{transform:translateX(16px)}
.toggle-label{font-size:11px;color:#555;font-weight:500}
.rr-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.rr-table th{background:#f9f8f5;padding:6px 7px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#888;border-bottom:1px solid #e2e0d8}
.rr-table td{padding:4px 5px;border-bottom:1px solid #f5f4f0}
.rr-table input,.rr-table select{padding:3px 6px;font-size:12px}
.rr-total{font-size:12px;font-weight:700;color:#0F6E56;text-align:right;padding:6px 6px 0}
.nbhd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:7px}
.nbhd-card{border:1px solid #d0cec6;border-radius:8px;padding:10px;cursor:pointer;background:#fff;transition:all .15s}
.nbhd-card:hover{border-color:#1D9E75;background:#f0fdf8}
.nbhd-card.active{border-color:#1D9E75;background:#E1F5EE}
.nbhd-card.outside{border-color:#f0ccc0}
.nbhd-name{font-size:12px;font-weight:600}
.nbhd-zips{font-size:10px;color:#888;margin-top:2px}
.nbhd-status{font-size:10px;font-weight:600;margin-top:4px}
.nbhd-card.active .nbhd-status{color:#0F6E56}
.nbhd-card.outside .nbhd-status{color:#993C1D}
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{background:#f9f8f5;padding:6px 9px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#888;border-bottom:1px solid #e2e0d8}
.rt td{padding:6px 9px;border-bottom:1px solid #f5f4f0;color:#444}
.rt .hi{color:#0F6E56;font-weight:600}
.resource-list{list-style:none}
.resource-list li{padding:8px 0;border-bottom:1px solid #f0ede8;font-size:12px}
.resource-list li:last-child{border-bottom:none}
.resource-list a{font-weight:500;color:#0F6E56}
.resource-list .rd{color:#888;font-size:11px;margin-top:1px}
.chart-wrap{background:#f9f8f5;border-radius:7px;overflow:hidden;margin-top:.5rem}
canvas{display:block;width:100%!important}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 10px;font-size:11px}
.legend-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:3px;vertical-align:middle}
.rpill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid #d0cec6;background:#fff;color:#555;margin:2px}
.rpill.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.resale-display{background:#f0fdf8;border-radius:6px;padding:7px 11px;font-size:11px;color:#085041;margin-top:5px;font-weight:500}
@media(max-width:640px){.two-col,.form-row{grid-template-columns:1fr}}
/* INTRO */
.intro-hero{background:linear-gradient(135deg,#0a3d2e 0%,#0F6E56 60%,#1D9E75 100%);border-radius:12px;padding:28px 30px;margin-bottom:1.25rem;color:#fff}
.intro-hero h2{font-size:22px;font-weight:700;margin-bottom:4px}
.intro-hero .sub{font-size:13px;opacity:.8;margin-bottom:16px}
.intro-body{font-size:13px;line-height:1.7;opacity:.93}
.intro-body p{margin-bottom:10px}
.intro-body p:last-child{margin-bottom:0}
.intro-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.intro-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:4px 13px;font-size:11px;font-weight:600;letter-spacing:.02em}
.intro-updated{font-size:11px;opacity:.6;margin-top:14px}
/* TOOLTIP */
.has-tip{position:relative;cursor:help;border-bottom:1px dashed #aaa}
.tip{display:none;position:absolute;left:0;top:calc(100% + 5px);width:240px;background:#1a1a1a;color:#fff;font-size:11px;line-height:1.5;padding:8px 10px;border-radius:7px;z-index:50;font-weight:400;pointer-events:none}
.has-tip:hover .tip{display:block}
/* STEP HOVER */
.step-body{cursor:default}
.step-hover{display:none;background:#f0fdf8;border:1px solid #9FE1CB;border-radius:6px;padding:8px 10px;margin-top:6px;font-size:11px;color:#085041;line-height:1.55}
.step:hover .step-hover{display:block}
/* RESOURCE SECTIONS */
.resource-section-head{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.07em;padding:10px 0 5px;border-top:1px solid #f0ede8;margin-top:4px}
.resource-section-head:first-child{border-top:none;margin-top:0;padding-top:0}
.nbhd-card.jp{border-color:#8B6BAF;background:#FAF5FF}
.nbhd-card.jp.active{border-color:#8B6BAF;background:#F0E6FF}
.nbhd-card.jp .nbhd-status{color:#6B3FA0}

</head>

<!-- RIGHTS -->
<div class="page active" id="page-rights">
  <div class="intro-hero">
    <h2><span class="en">Chicago Tenant Opportunity to Purchase Act</span><span class="es" style="display:none">Ley de Oportunidad de Compra para Inquilinos de Chicago</span></h2>
    <div class="sub"><span class="en">A practical guide to Chicago's TOPA pilot programs, cooperative conversion, and financial tools for tenant groups</span><span class="es" style="display:none">Una guía práctica sobre los programas piloto TOPA de Chicago, conversión cooperativa y herramientas financieras para grupos de inquilinos</span></div>
    <div class="intro-body en">
      <p>Chicago — like cities across the country — faces a widening affordable housing gap. Decades of disinvestment, followed by rapid reinvestment and rising property values, have displaced tens of thousands of long-term residents from neighborhoods they built. Between 2012 and 2021, the Chicago metro area lost hundreds of thousands of units affordable to low-income renters, with the heaviest losses concentrated in historically Black and Latine neighborhoods on the northwest and south sides.</p>
      <p><strong>Preservation is one of the most cost-effective strategies</strong> to prevent displacement. Keeping existing affordable rental housing in community hands — through tenant purchase, community land trusts, limited-equity cooperatives, or nonprofit stewardship — avoids the higher costs of new construction while protecting residents already in place. Every unit lost to speculation or market conversion is one that must be rebuilt at far greater expense, if it is rebuilt at all.</p>
      <p><strong>Tenant Opportunity to Purchase (TOPA)</strong> policies give renters a structured right to purchase their building before it can be sold to an outside investor. When paired with the right resources — acquisition capital, public subsidies, legal assistance, technical expertise, and community development capacity — TOPA can be a powerful tool for resident-led preservation and cooperative ownership. Washington D.C.'s TOPA program, in place since 1980, has helped preserve tens of thousands of affordable units and supported the creation of dozens of resident-owned cooperatives.</p>
      <p>Chicago's pilot programs — the Block (606) District on the northwest side (effective March 1, 2025) and the Jackson Park District on the south side (effective April 6, 2026) — represent a meaningful step. Making them work requires more than the right to purchase: it requires investment in tenant education, dedicated acquisition financing, organizational capacity, and sustained partnerships between city agencies, nonprofits, and community groups.</p>
      <p><em>This tool is designed to help tenants, advocates, and housing counselors understand their rights, explore the financial feasibility of a purchase, and consider cooperative conversion as a path to permanent affordability.</em></p>
    </div>
    <div class="intro-body es" style="display:none">
      <p>Chicago — como muchas ciudades — enfrenta una brecha creciente de vivienda asequible. Décadas de desinversión, seguidas de reinversión rápida y el aumento de los valores de propiedad, han desplazado a decenas de miles de residentes de larga data de los vecindarios que construyeron. Entre 2012 y 2021, el área metropolitana de Chicago perdió cientos de miles de unidades asequibles para inquilinos de bajos ingresos, con las mayores pérdidas en vecindarios históricamente negros y latinos del noroeste y del sur de la ciudad.</p>
      <p><strong>La preservación es una de las estrategias más rentables</strong> para prevenir el desplazamiento. Mantener la vivienda de alquiler asequible existente en manos comunitarias — a través de la compra por inquilinos, fideicomisos de tierras comunitarias, cooperativas de capital limitado o administración sin fines de lucro — evita los costos más altos de la nueva construcción mientras protege a los residentes ya establecidos.</p>
      <p><strong>Las políticas de Oportunidad de Compra para Inquilinos (TOPA)</strong> otorgan a los inquilinos el derecho estructurado de comprar su edificio antes de que pueda venderse a un inversionista externo. Cuando se combinan con los recursos adecuados — capital de adquisición, subsidios públicos, asistencia legal, experiencia técnica y capacidad de desarrollo comunitario — el TOPA puede ser una herramienta poderosa para la preservación liderada por residentes y la propiedad cooperativa.</p>
      <p>Los programas piloto de Chicago — el Distrito Bloque (606) en el lado noroeste (vigente desde el 1 de marzo de 2025) y el Distrito Jackson Park en el lado sur (vigente desde el 6 de abril de 2026) — representan un paso significativo.</p>
      <p><em>Esta herramienta está diseñada para ayudar a inquilinos, defensores y consejeros de vivienda a comprender sus derechos, explorar la factibilidad financiera de una compra y considerar la conversión cooperativa como un camino hacia la asequibilidad permanente.</em></p>
    </div>
    <div class="intro-pills">
      <span class="intro-pill">🏘 <span class="en">Block (606) District</span><span class="es" style="display:none">Distrito Bloque (606)</span></span>
      <span class="intro-pill">🌳 <span class="en">Jackson Park District</span><span class="es" style="display:none">Distrito Jackson Park</span></span>
      <span class="intro-pill">🤝 <span class="en">Tenant Purchase Rights</span><span class="es" style="display:none">Derechos de Compra</span></span>
      <span class="intro-pill">🏛 <span class="en">Co-op Conversion</span><span class="es" style="display:none">Conversión Cooperativa</span></span>
      <span class="intro-pill">📊 <span class="en">Financial Feasibility</span><span class="es" style="display:none">Factibilidad Financiera</span></span>
    </div>
    <div class="intro-updated"><span class="en">Last updated April 15, 2026 · Reflects Jackson Park TOPA expansion (effective April 6, 2026)</span><span class="es" style="display:none">Última actualización: 15 de abril de 2026 · Refleja la expansión TOPA de Jackson Park (vigente desde el 6 de abril de 2026)</span></div>
  </div>
  <div class="section-title"><span class="en">Know your rights as a renter</span><span class="es" style="display:none">Conoce tus derechos como inquilino</span></div>
  <div class="section-sub"><span class="en">Select your program area, building size, and situation to see your specific rights and timelines.</span><span class="es" style="display:none">Selecciona tu área de programa, tamaño de edificio y situación para ver tus derechos y plazos específicos.</span></div>
  <div class="card"><div class="card-body">
    <div class="form-group">
      <label><span class="en">Which TOPA program covers your building?</span><span class="es" style="display:none">¿Qué programa TOPA cubre tu edificio?</span></label>
      <div class="btn-group" id="program-group">
        <button class="btn-opt active" onclick="setProg('606',this)"><span class="en">Block (606) District — NW Side</span><span class="es" style="display:none">Distrito Bloque (606) — Lado NW</span></button>
        <button class="btn-opt" onclick="setProg('jp',this)"><span class="en">Jackson Park District — South Side</span><span class="es" style="display:none">Distrito Jackson Park — Lado Sur</span></button>
      </div>
    </div>
    <div id="prog-note" class="alert alert-blue text-sm" style="margin-bottom:10px"></div>
    <div class="form-group">
      <label><span class="en">Units in your building?</span><span class="es" style="display:none">¿Cuántas unidades tiene tu edificio?</span></label>
      <div class="btn-group" id="unit-group">
        <button class="btn-opt" onclick="setUnits('1-2',this)">1–2</button>
        <button class="btn-opt" onclick="setUnits('3-4',this)">3–4</button>
        <button class="btn-opt" onclick="setUnits('5+',this)">5+</button>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label><span class="en">What situation applies?</span><span class="es" style="display:none">¿Cuál situación aplica?</span></label>
      <div class="btn-group" style="margin-bottom:0" id="sit-group">
        <button class="btn-opt" onclick="setSit('intent',this)"><span class="en">Owner wants to sell</span><span class="es" style="display:none">Dueño quiere vender</span></button>
        <button class="btn-opt" onclick="setSit('offer',this)"><span class="en">Offer accepted</span><span class="es" style="display:none">Oferta aceptada</span></button>
        <button class="btn-opt" onclick="setSit('purchase',this)"><span class="en">We want to buy</span><span class="es" style="display:none">Queremos comprar</span></button>
        <button class="btn-opt" onclick="setSit('general',this)"><span class="en">General protections</span><span class="es" style="display:none">Protecciones generales</span></button>
      </div>
    </div>
  </div></div>

<!-- NEIGHBORHOOD -->
<div class="page" id="page-neighborhood">
  <div class="section-title"><span class="en">Is your building in a TOPA area?</span><span class="es" style="display:none">¿Tu edificio está en una zona TOPA?</span></div>
  <div class="section-sub"><span class="en">Two pilot programs are now active. The Block (606) District (NW Side, since March 1, 2025) and the Jackson Park District (South Side, since April 6, 2026). Click your neighborhood.</span><span class="es" style="display:none">Dos programas piloto están vigentes. El Distrito Bloque (606) (Lado NW, desde el 1 de marzo de 2025) y el Distrito Jackson Park (Lado Sur, desde el 6 de abril de 2026). Haz clic en tu vecindario.</span></div>
  <p class="text-sm" style="font-weight:600;margin-bottom:8px;color:#0F6E56"><span class="en">🏘 Block (606) District — Northwest Side (effective March 1, 2025)</span><span class="es" style="display:none">🏘 Distrito Bloque (606) — Lado Noroeste (vigente desde el 1 de marzo de 2025)</span></p>
  <div class="nbhd-grid" id="nbhd-grid">
    <div class="nbhd-card active" onclick="selNbhd('logan',this)"><div class="nbhd-name">Logan Square</div><div class="nbhd-zips">60647, 60618</div><div class="nbhd-status">✓ <span class="en">Block (606)</span><span class="es" style="display:none">Bloque (606)</span></div></div>

<div class="page" id="page-coop">
  <div class="section-title"><span class="en">Converting to a Housing Cooperative</span><span class="es" style="display:none">Conversión a Cooperativa de Vivienda</span></div>
  <div class="section-sub"><span class="en">Model the co-op structure, individual economics, and long-term share value.</span><span class="es" style="display:none">Modela la estructura cooperativa, la economía individual y el valor de la acción a largo plazo.</span></div>
  <div class="card"><div class="card-header"><h3><span class="en">What is a limited-equity housing cooperative?</span><span class="es" style="display:none">¿Qué es una cooperativa de vivienda de capital limitado?</span></h3></div><div class="card-body">
    <p class="text-sm"><span class="en">In a limited-equity co-op, residents collectively own the building through a nonprofit corporation. Each household buys a "share" and pays a monthly carrying charge covering mortgage, taxes, insurance, reserves, and operating costs — instead of rent. Share resale values are capped to keep housing permanently affordable.</span><span class="es" style="display:none">En una cooperativa de capital limitado, los residentes son copropietarios del edificio. Cada hogar compra una "acción" y paga una cuota mensual en lugar de renta. El valor de reventa de las acciones está limitado para mantener la vivienda asequible permanentemente.</span></p>
  </div></div>

  <div class="two-col">
  <div>
    <div class="card"><div class="card-header"><h3><span class="en">Co-op calculator</span><span class="es" style="display:none">Calculadora cooperativa</span></h3></div><div class="card-body">

        <div><label><span class="has-tip"><span class="en">Number of shares</span><span class="es" style="display:none">Número de acciones</span><span class="tip"><span class="en">Defaults to the number of units in your building — one share per household. You can adjust if some units are combined or structured differently.</span><span class="es" style="display:none">Por defecto es el número de unidades del edificio — una acción por hogar. Puedes ajustar si algunas unidades se combinan o se estructuran de manera diferente.</span></span></span></label><input type="number" id="c_units" value="6" oninput="calcC()"></div>
      </div>
      <div class="form-row">
        <div><label><span class="en">Share value (each)</span><span class="es" style="display:none">Valor de acción</span></label><input type="number" id="c_share" value="10000" oninput="calcC()"></div>
        <div><label><span class="en">Current rent (status quo)</span><span class="es" style="display:none">Renta actual (status quo)</span></label><input type="number" id="c_curr_rent" value="1100" oninput="calcC()"></div>
      </div>
      <div><label><span class="en">Annual rent increase, status quo (%)</span><span class="es" style="display:none">Aumento anual de renta, status quo (%)</span></label><input type="number" id="c_rent_growth" value="4" step="0.5" oninput="calcC()"></div>
      <hr class="divider">
      <div style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px"><span class="en">Share loan</span><span class="es" style="display:none">Préstamo de acción</span></div>
      <div class="toggle-row">
        <label class="toggle"><input type="checkbox" id="c_amort" checked onchange="calcC()"><span class="tog-sl"></span></label>
        <span class="toggle-label"><span class="en">Amortizing (principal + interest)</span><span class="es" style="display:none">Amortizante (capital + interés)</span></span>
      </div>
      <div id="io-note" class="text-sm" style="display:none;color:#BA7517;margin-bottom:7px"><span class="en">Interest-only: member pays interest monthly; full principal due at term end.</span><span class="es" style="display:none">Solo interés: el miembro paga interés mensualmente; capital completo al vencimiento.</span></div>
      <div class="form-row">
        <div><label><span class="en">Share loan rate (%)</span><span class="es" style="display:none">Tasa del préstamo (%)</span></label><input type="number" id="c_srate" value="3.0" step="0.25" oninput="calcC()"></div>
        <div><label><span class="en">Share loan term (yrs)</span><span class="es" style="display:none">Plazo (años)</span></label><input type="number" id="c_sterm" value="15" oninput="calcC()"></div>

    <div class="card mt-2"><div class="card-header"><h3><span class="en">Resources</span><span class="es" style="display:none">Recursos</span></h3></div><div class="card-body">
      <div class="resource-section-head"><span class="en">🏙 Chicago — TOPA &amp; Tenant Rights</span><span class="es" style="display:none">🏙 Chicago — TOPA y Derechos de Inquilinos</span></div>
      <ul class="resource-list">
        <li><a href="https://www.chicago.gov/city/en/depts/doh/supp_info/topa.html" target="_blank">City of Chicago — Official TOPA Program Page</a><div class="rd"><span class="en">DOH's official resource for both the Block (606) and Jackson Park TOPA programs, including notice requirements, timelines, and forms.</span><span class="es" style="display:none">Recurso oficial del DOH para los programas TOPA del Bloque (606) y Jackson Park, incluyendo requisitos de aviso, plazos y formularios.</span></div></li>
        <li><a href="https://www.palenquelsna.org/" target="_blank">Palenque LSNA</a><div class="rd"><span class="en">Advocacy and housing programs on Chicago's northwest side. LSNA has been active in supporting tenant rights, community preservation, and immigrant housing justice.</span><span class="es" style="display:none">Programas de defensa y vivienda en el lado noroeste de Chicago. LSNA ha estado activo en el apoyo a los derechos de los inquilinos, la preservación comunitaria y la justicia habitacional de inmigrantes.</span></div></li>

        <li><a href="https://thecommunityweb.org/" target="_blank">The Community WEB</a><div class="rd"><span class="en">Technical assistance, training, and community organizing support for tenant groups pursuing cooperative conversion in Chicago.</span><span class="es" style="display:none">Asistencia técnica, capacitación y apoyo comunitario para grupos de inquilinos que buscan la conversión cooperativa en Chicago.</span></div></li>
        <li><a href="https://resurrectionproject.org/co-op-share-loans/" target="_blank">The Resurrection Project — Co-op Share Loans</a><div class="rd"><span class="en">Affordable share loans for limited-equity co-op members on Chicago's northwest and southwest sides.</span><span class="es" style="display:none">Préstamos de acciones asequibles para miembros de cooperativas en Chicago.</span></div></li>

  <div class="card mt-2"><div class="card-header"><h3><span class="en">Cooperative conversion pathway</span><span class="es" style="display:none">Ruta de conversión cooperativa</span></h3></div><div class="card-body">
    <p class="text-sm" style="margin-bottom:12px"><span class="en">Hover over each step for detail on Chicago TOPA timelines and process. Timelines shown are for buildings with 5+ units — see the "Your Rights" tab for 1–4 unit timelines.</span><span class="es" style="display:none">Pasa el cursor sobre cada paso para ver detalles sobre los plazos y el proceso TOPA de Chicago.</span></p>
    <ul class="timeline">
      <li class="step">
        <div class="step-num" style="background:#E1F5EE;color:#085041">1</div>
        <div class="step-body">
          <div class="step-title"><span class="en">Receive Notice of Intent to Sell → Form tenant association</span><span class="es" style="display:none">Recibir Aviso de Intención de Venta → Formar asociación de inquilinos</span></div>
          <div class="step-desc"><span class="en">Owner gives 60-day notice before listing (5+ unit buildings). Tenants have 90 days from the Notice of Sale to form an association (75% consent required) and notify the owner and DOH.</span><span class="es" style="display:none">El dueño da 60 días de aviso antes de listar (edificios de 5+ unidades). Los inquilinos tienen 90 días desde el aviso de venta para formar una asociación (75% de consentimiento requerido) y notificar al dueño y al DOH.</span></div>
          <div class="step-hover"><span class="en"><strong>TOPA timeline:</strong> For 5+ unit buildings, you get 60 days' notice before listing, then 90 days from the accepted-offer notice to form an association and exercise your right of first refusal. Use this time to contact The Community WEB, UHAB, or other technical assistance experts and legal counsel. Gather financial documents using your 30-day information request right.</span><span class="es" style="display:none"><strong>Cronograma TOPA:</strong> Para edificios de 5+ unidades, obtienes 60 días de aviso antes de la publicación, luego 90 días desde el aviso de oferta aceptada para formar una asociación y ejercer tu derecho de primera negativa.</span></div>
        </div>
      </li>
      <li class="step">
        <div class="step-num" style="background:#E6F1FB;color:#0C447C">2</div>
        <div class="step-body">
          <div class="step-title"><span class="en">Exercise right of first refusal → Engage technical assistance</span><span class="es" style="display:none">Ejercer derecho de primera negativa → Involucrar asistencia técnica</span></div>
          <div class="step-desc"><span class="en">Notify the owner in writing and submit your earnest money deposit (max 5% of sale price). Simultaneously engage a housing attorney and a technical assistance (TA) provider to begin co-op feasibility analysis.</span><span class="es" style="display:none">Notifica al dueño por escrito y presenta tu depósito de garantía (máx. 5% del precio de venta). Involucra a un abogado de vivienda y a un proveedor de asistencia técnica para comenzar el análisis de factibilidad cooperativa.</span></div>
          <div class="step-hover"><span class="en"><strong>Who can help:</strong> The Community WEB, UHAB, and other TA experts can help you assess financial feasibility, connect with financing sources, and begin the incorporation process. Chicago Legal Aid and other legal aid organizations provide free or reduced-cost legal support. You can assign your right of first refusal to a nonprofit partner (e.g. Here to Stay CLT) with 10 business days' written notice to the owner.</span><span class="es" style="display:none"><strong>Quién puede ayudar:</strong> The Community WEB, UHAB y otros expertos en asistencia técnica pueden ayudarte a evaluar la factibilidad financiera, conectarte con fuentes de financiamiento y comenzar el proceso de incorporación. Chicago Legal Aid ofrece apoyo legal a bajo costo.</span></div>
        </div>
      </li>
      <li class="step">
        <div class="step-num" style="background:#FAEEDA;color:#633806">3</div>
        <div class="step-body">
          <div class="step-title"><span class="en">Incorporate the co-op + secure financing</span><span class="es" style="display:none">Incorporar la cooperativa + asegurar financiamiento</span></div>
          <div class="step-desc"><span class="en">File as an Illinois nonprofit housing corporation. Draft bylaws, occupancy agreements, share structure, and resale formula. Secure blanket mortgage, apply for member share loans, and identify gap funding from DOH, IHDA, or other sources.</span><span class="es" style="display:none">Registrar como corporación sin fines de lucro. Redactar estatutos, acuerdos de ocupación, estructura de acciones y fórmula de reventa. Asegurar hipoteca general, solicitar préstamos de acciones y identificar financiamiento de brecha.</span></div>
          <div class="step-hover"><span class="en"><strong>Financing sources:</strong> Blanket mortgages from community development lenders (CDFI); member share loans through The Resurrection Project or Chicago Community Loan Fund (CCLT); gap equity from Chicago DOH preservation programs or IHDA. If public funds are used, the property must remain affordable housing for at least 30 years. You have 120 days from your election notice to complete due diligence and close.</span><span class="es" style="display:none"><strong>Fuentes de financiamiento:</strong> Hipotecas generales de prestamistas de desarrollo comunitario (CDFI); préstamos de acciones a través de The Resurrection Project o CCLT; capital de brecha del DOH de Chicago o IHDA. Tienes 120 días desde tu aviso de elección para completar la diligencia debida y cerrar.</span></div>
        </div>
      </li>
      <li class="step">
        <div class="step-num" style="background:#FCEBEB;color:#791F1F">4</div>
        <div class="step-body">
          <div class="step-title"><span class="en">Complete governance training + close on the building</span><span class="es" style="display:none">Completar capacitación de gobernanza + cerrar la compra</span></div>
          <div class="step-desc"><span class="en">Complete co-op governance and financial literacy training for all members. Close on the building, issue share certificates, and establish carrying charge collection and replacement reserve accounts.</span><span class="es" style="display:none">Completar la capacitación de gobernanza cooperativa y educación financiera para todos los miembros. Cerrar la compra, emitir certificados de acciones y establecer cuentas de cobro de cuotas y reserva de reemplazo.</span></div>
          <div class="step-hover"><span class="en"><strong>Training resources:</strong> The Community WEB, UHAB, and other experts provide governance training, financial literacy workshops, and ongoing support for newly-formed co-ops. Budget for both upfront training (at conversion) and ongoing annual training to sustain healthy governance. Tip: establish your reserve fund and carrying charge collection system on day one.</span><span class="es" style="display:none"><strong>Recursos de capacitación:</strong> The Community WEB, UHAB y otros expertos brindan capacitación en gobernanza, talleres de educación financiera y apoyo continuo para cooperativas recién formadas. Presupuesta tanto para la capacitación inicial como para la capacitación anual continua.</span></div>
        </div>
      </li>
      <li class="step">
        <div class="step-num" style="background:#EAF3DE;color:#3B6D11">5</div>
        <div class="step-body">
          <div class="step-title"><span class="en">Ongoing self-governance + long-term stewardship</span><span class="es" style="display:none">Autogestión continua + administración a largo plazo</span></div>
          <div class="step-desc"><span class="en">Annual shareholder meetings, board elections, and budget approvals. Maintain affordability restrictions, grow the replacement reserve, and reinvest in the building. Access ongoing TA through The Community WEB, UHAB, and other experts to sustain healthy co-op governance.</span><span class="es" style="display:none">Reuniones anuales de accionistas, elecciones de junta y aprobaciones de presupuesto. Mantener restricciones de asequibilidad, hacer crecer la reserva de reemplazo y reinvertir en el edificio.</span></div>
          <div class="step-hover"><span class="en"><strong>Sustaining affordability:</strong> Your resale restriction formula is the key legal mechanism locking in affordability for future residents. Annual carrying charge increases should be modest (typically 2–3%) and tied to actual operating cost increases — not market rents. If you received public funding, your 30-year affordability covenant is recorded with the property deed. UHAB's resource library has model bylaws, financial templates, and governance guides for ongoing support.</span><span class="es" style="display:none"><strong>Manteniendo la asequibilidad:</strong> La fórmula de restricción de reventa es el mecanismo legal clave para garantizar la asequibilidad para futuros residentes. Los aumentos anuales de la cuota deben ser modestos (típicamente 2–3%) y vinculados a los aumentos reales de los costos operativos — no a las rentas de mercado.</span></div>
        </div>
      </li>
    </ul>
  </div></div>

function pmtFn(r,n,pv){if(r===0)return pv/n;return r*pv/(1-Math.pow(1+r,-n));}
function loanBal(r,n,pv,paid){if(r===0)return Math.max(0,pv-pv/n*paid);return pv*Math.pow(1+r,paid)-pmtFn(r,n,pv)*((Math.pow(1+r,paid)-1)/r);}

e damages.','Falta de aviso adecuado: multa de $200–$1,000 por día. Los inquilinos también pueden demandar en corte civil.')+'</div></div></div>';

function applyBench(){

function buildRoll(){
  var n=parseInt(document.getElementById('f_units').value)||6;
  var c=document.getElementById('rr-container');
  var rows='<table class="rr-table"><thead><tr><th>#</th><th>'+T('BR','Rec.')+'</th><th>'+T('Monthly rent','Renta mensual')+'</th><th>'+T('Notes','Notas')+'</th></tr></thead><tbody>';
  for(var i=1;i<=n;i++){
    rows+='<tr><td style="color:#888;font-weight:600">'+i+'</td><td><select class="rr-br" onchange="calcF()"><option value="0">Stu.</option><option value="1">1 BR</option><option value="2" selected>2 BR</option><option value="3">3 BR</option></select></td><td><input type="number" class="rr-rent" value="900" oninput="calcF()"></td><td><input type="text" class="rr-note" placeholder="'+T('optional...','opcional...')+'"></td></tr>';
  }

}
function getRollTotal(){var r=document.querySelectorAll('.rr-rent'),s=0;r.forEach(function(x){s+=parseFloat(x.value)||0;});return s;}

// FINANCE
function calcF(){
  var price=+document.getElementById('f_price').value||0;
  var numU=+document.getElementById('f_units').value||1;
  var rehab=+document.getElementById('f_rehab').value||0;
  var soft=(+document.getElementById('f_soft').value||0)/100;
  var cont=(+document.getElementById('f_cont').value||0)/100;
  var ltvPct=(+document.getElementById('f_ltv').value||70)/100;
  var annRate=(+document.getElementById('f_rate').value||7)/100;
  var termYrs=+document.getElementById('f_term').value||30;
  var dscrMin=+document.getElementById('f_dscr_min').value||1.20;
  var vac=(+document.getElementById('f_vac').value||5)/100;
  var tax=+document.getElementById('f_tax').value||0;
  var ins=+document.getElementById('f_ins').value||0;
  var maint=+document.getElementById('f_maint').value||0;
  var resv=(+document.getElementById('f_reserve').value||0)*numU;
  var softC=rehab*soft, contC=(rehab+softC)*cont;
  var totalRehab=rehab+softC+contC, totalCost=price+totalRehab;
  var grossRent, rentPU;
  if(rentMode==='roll'){
    var tot=getRollTotal(); grossRent=tot*12; rentPU=numU>0?tot/numU:0;
    var rt=document.getElementById('rr-total');
    if(rt)rt.textContent=T('Total gross monthly rent: ','Renta bruta mensual total: ')+fmt(tot);
  } else {
    rentPU=+document.getElementById('f_rent').value||0; grossRent=rentPU*numU*12;
  }
  var egi=grossRent*(1-vac), opex=tax+ins+maint+resv, noi=egi-opex;
  var moRate=annRate/12, termMo=termYrs*12;
  var loanLTV=price*ltvPct;
  var maxDebt=noi/dscrMin, maxMoPmt=maxDebt/12;
  var factor=moRate===0?termMo:(1-Math.pow(1+moRate,-termMo))/moRate;
  var loanDSCR=Math.max(0,maxMoPmt*factor);
  var loan=Math.min(loanLTV,loanDSCR), limitBy=loan===loanLTV?'LTV':'DSCR';
  var moPmt=pmtFn(moRate,termMo,loan), annDebt=moPmt*12;
  var dscr=annDebt>0?noi/annDebt:0, equity=totalCost-loan, cf=noi-annDebt;
  var cap=totalCost>0?(noi/totalCost)*100:0;
  document.getElementById('max-loan-val').textContent=fmt(loan);
  document.getElementById('max-loan-why').textContent=T('Limited by '+limitBy+' (LTV: '+fmt(loanLTV)+', DSCR: '+fmt(loanDSCR)+')','Limitado por '+limitBy+' (LTV: '+fmt(loanLTV)+', DSCR: '+fmt(loanDSCR)+')');
  var dc=dscr>=1.2?'#0F6E56':dscr>=1.0?'#BA7517':'#A32D2D';
  var cfcls=cf>=0?'surplus':'gap';
  document.getElementById('finance-output').innerHTML=
    '<div class="calc-result"><h4>'+T('Project summary','Resumen del proyecto')+'</h4>'+
    '<div class="result-section">'+
    '<div class="result-row"><span>'+T('Purchase price','Precio de compra')+'</span><span class="result-num">'+fmt(price)+'</span></div>'+
    '<div class="result-row"><span>'+T('Rehab (hard costs)','Rehabilitación (costos duros)')+'</span><span class="result-num">'+fmt(rehab)+'</span></div>'+
    '<div class="result-row"><span>'+T('Soft costs','Costos blandos')+' ('+Math.round(soft*100)+'%)</span><span class="result-num">'+fmt(softC)+'</span></div>'+
    '<div class="result-row"><span>'+T('Contingency','Contingencia')+' ('+Math.round(cont*100)+'%)</span><span class="result-num">'+fmt(contC)+'</span></div>'+
    '<div class="result-row total"><span>'+T('Total project cost','Costo total del proyecto')+'</span><span class="result-num">'+fmt(totalCost)+'</span></div>'+
    '</div><div class="result-section"><h5>'+T('Financing structure','Estructura de financiamiento')+'</h5>'+
    '<div class="result-row"><span>'+T('Max LTV-based loan','Préstamo máx. por LTV')+'</span><span class="result-num">'+fmt(loanLTV)+'</span></div>'+
    '<div class="result-row"><span>'+T('Max DSCR-based loan','Préstamo máx. por DSCR')+' ('+dscrMin.toFixed(2)+'x NOI)</span><span class="result-num">'+fmt(loanDSCR)+'</span></div>'+
    '<div class="result-row sub" style="color:'+(limitBy==='DSCR'?'#A32D2D':'#0F6E56')+'"><span>'+T('→ Loan amount (lower of LTV / DSCR)','→ Monto del préstamo (menor de LTV / DSCR)')+'</span><span class="result-num">'+fmt(loan)+'</span></div>'+
    '<div class="result-row"><span>'+T('Monthly mortgage payment','Pago mensual de hipoteca')+'</span><span class="result-num">'+fmt(moPmt)+'/mo</span></div>'+
    '<div class="result-row total"><span>'+T('Required equity / subsidy','Capital propio / subsidio requerido')+'</span><span class="result-num">'+fmt(equity)+'</span></div>'+
    '</div><div class="result-section"><h5>'+T('Income & expense pro forma','Pro forma de ingresos y gastos')+'</h5>'+
    '<div class="result-row"><span>'+T('Gross potential rent','Renta bruta potencial')+'</span><span class="result-num">'+fmt(grossRent)+'/yr</span></div>'+
    '<div class="result-row"><span>'+T('Effective gross income','Ingreso bruto efectivo')+' ('+Math.round(vac*100)+'% vac.)</span><span class="result-num">'+fmt(egi)+'/yr</span></div>'+
    '<div class="result-row"><span>'+T('Operating expenses','Gastos operativos')+'</span><span class="result-num">('+fmt(opex)+')/yr</span></div>'+
    '<div class="result-row sub"><span>'+T('Net operating income (NOI)','Ingreso operativo neto (NOI)')+'</span><span class="result-num">'+fmt(noi)+'/yr</span></div>'+
    '<div class="result-row"><span>'+T('Annual debt service','Servicio de deuda anual')+'</span><span class="result-num">('+fmt(annDebt)+')/yr</span></div>'+
    '<div class="result-row '+cfcls+'"><span>'+T('Cash flow','Flujo de efectivo')+'</span><span class="result-num">'+(cf>=0?'':'(')+fmt(Math.abs(cf))+'/yr'+(cf<0?')':'')+'</span></div>'+
    '</div><div class="result-section"><h5>'+T('Key metrics','Indicadores clave')+'</h5>'+
    '<div class="result-row"><span>'+T('Cap rate','Tasa de capitalización')+'</span><span class="result-num">'+cap.toFixed(2)+'%</span></div>'+
    '<div class="result-row"><span>DSCR</span><span class="result-num" style="color:'+dc+';font-weight:700">'+dscr.toFixed(2)+'x</span></div>'+
    '<div class="result-row"><span>'+T('Cost per unit','Costo por unidad')+'</span><span class="result-num">'+fmt(totalCost/numU)+'</span></div>'+
    '</div>'+
    (dscr<1.2?'<div class="alert alert-'+(dscr>=1.0?'amber':'red')+'">'+
    (dscr<1.0?T('⚠ NOI does not cover debt service. Additional subsidy, higher rents, or lower loan required.','⚠ El NOI no cubre el servicio de deuda. Se requiere subsidio adicional, rentas más altas o préstamo menor.'):T('DSCR below typical lender threshold of 1.25. Consider reducing loan or seeking additional subsidy.','DSCR por debajo del umbral típico de 1.25 del prestamista. Considera reducir el préstamo o buscar subsidio adicional.'))+'</div>':
    '<div class="alert alert-green">'+T('DSCR is in the lender-acceptable range (≥1.2). Project may be financeable with current assumptions.','El DSCR está en el rango aceptable para prestamistas (≥1.2). El proyecto puede ser financiable con los supuestos actuales.')+'</div>')+
    '<p class="text-sm mt-1">'+T('Estimation tool only. Consult a housing advisor, lender, or accountant before making financial decisions.','Solo herramienta de estimación. Consulta a un asesor de vivienda, prestamista o contador antes de tomar decisiones financieras.')+'</p></div>';
}

function calcC(){
  var total=+document.getElementById('c_total').value||0;
  var numU=+document.getElementById('c_units').value||1;
  var sv=+document.getElementById('c_share').value||0;
  var currRent=+document.getElementById('c_curr_rent').value||0;
  var rg=(+document.getElementById('c_rent_growth').value||4)/100;
  var cg=(+document.getElementById('c_carry_growth').value||2.5)/100;
  var sr=(+document.getElementById('c_srate').value||3)/100/12;
  var st=(+document.getElementById('c_sterm').value||15)*12;
  var amortEl=document.getElementById('c_amort'); var amort=amortEl?amortEl.checked:true;
  document.getElementById('io-note').style.display=amort?'none':'';
  var org=+document.getElementById('c_org').value||0;
  var tup=+document.getElementById('c_trainup').value||0;
  var tyr=+document.getElementById('c_trainyr').value||0;
  var res=(+document.getElementById('c_res').value||0)*numU;
  var ops=+document.getElementById('c_ops').value||0;
  var utilities=+document.getElementById('c_utilities').value||0;
  // blanket mortgage — LTV/DSCR constrained
  var cprice=+document.getElementById('c_price').value||0;
  var mltv=(+document.getElementById('c_mltv').value||70)/100;
  var mr=(+document.getElementById('c_mrate').value||7)/100/12;
  var mt=(+document.getElementById('c_mterm').value||30)*12;
  var mdscr=+document.getElementById('c_mdscr').value||1.15;
  var annOps=ops+res+tyr+utilities;
  var totalShares=sv*numU;
  var shareMo=amort?pmtFn(sr,st,sv):(sv*sr);
  // DSCR for blanket mortgage uses carrying income (all member charges as "revenue")
  // We compute: NOI of co-op = totalShares income - opex; maxDebt = NOI/dscrMin
  // But carrying charge is itself derived from mort payment — iterative. Use a simpler approach:
  // gross income proxy = numU * (currRent + shareMo) monthly; opex = annOps
  // Actually: co-op doesn't have "rent income" — carrying charge IS the source of debt service + ops.
  // DSCR for blanket: available for debt service = annual carrying charge collections - opex
  // We estimate: est. gross carry = numU * (currRent * 0.95) as proxy for what market would support
  // Better: compute max loan based on LTV directly, then show DSCR for reference
  var loanLTV=cprice*mltv;
  // For DSCR: max annual debt = (annOps can be covered by member charges; so we treat it separately)
  // max monthly payment that leaves DSCR satisfied: NOI = annOps*(1+0) already committed
  // approach: available annual debt service = (numU * currRent * 12) / dscrMin - annOps not ideal
  // Use: max annual DS = numU * currRent * 12 / (dscrMin + annOps/(numU*currRent*12)) — approximate
  // Simplest consistent with finance tab: treat monthly rent * units as gross income
  var grossCarry=currRent*numU*12;
  var maxDebtDS=(grossCarry-annOps)/mdscr;
  var maxMoPmt=maxDebtDS/12;
  var mFactor=mr===0?mt:(1-Math.pow(1+mr,-mt))/mr;
  var loanDSCR=Math.max(0,maxMoPmt*mFactor);
  var mort=Math.min(loanLTV,loanDSCR);
  var limitBy=mort===loanLTV?'LTV':'DSCR';
  // update highlighted box
  var mlv=document.getElementById('c-max-loan-val');
  var mlw=document.getElementById('c-max-loan-why');
  if(mlv){mlv.textContent=fmt(mort);}
  if(mlw){mlw.textContent=T('Limited by '+limitBy+' (LTV: '+fmt(loanLTV)+', DSCR: '+fmt(loanDSCR)+')','Limitado por '+limitBy+' (LTV: '+fmt(loanLTV)+', DSCR: '+fmt(loanDSCR)+')');}
  var mortMo=pmtFn(mr,mt,mort);
  var annDebt=mortMo*12;
  var carry=(annDebt+annOps)/numU/12;
  var totalMo=carry+shareMo;
  var gap=Math.max(0,total-mort-totalShares);
  var dscr=annDebt>0?(grossCarry-annOps)/annDebt:0;
  var cc=carry<1400?'#0F6E56':carry<2000?'#BA7517':'#A32D2D';
  // resale display
  var yr5=shareAtYr(sv,5),yr10=shareAtYr(sv,10),yr20=shareAtYr(sv,20);
  var rlab={fixed:T('Fixed (no appreciation)','Fijo (sin apreciación)'),cpi:T('CPI-indexed','Indexado al IPC'),ami:T('AMI-indexed','Indexado al AMI'),imprv:T('Base + improvements','Base + mejoras')};
  document.getElementById('resale-display').innerHTML=T('Formula:','Fórmula:')+' <strong>'+rlab[resaleMode]+'</strong> &nbsp;|&nbsp; Yr 5 = '+fmt(yr5)+' &nbsp; Yr 10 = '+fmt(yr10)+' &nbsp; Yr 20 = '+fmt(yr20);
  document.getElementById('coop-output').innerHTML=
    '<div class="calc-result"><h4>'+T('Co-op capital structure','Estructura de capital cooperativo')+'</h4>'+
    '<div class="result-section">'+
    '<div class="result-row"><span>'+T('Total project cost','Costo total del proyecto')+'</span><span class="result-num">'+fmt(total)+'</span></div>'+
    '<div class="result-row"><span>'+T('Max LTV-based mortgage','Hipoteca máx. por LTV')+'</span><span class="result-num">'+fmt(loanLTV)+'</span></div>'+
    '<div class="result-row"><span>'+T('Max DSCR-based mortgage','Hipoteca máx. por DSCR')+' ('+mdscr.toFixed(2)+'x)</span><span class="result-num">'+fmt(loanDSCR)+'</span></div>'+
    '<div class="result-row sub" style="color:'+(limitBy==='DSCR'?'#A32D2D':'#0F6E56')+'"><span>'+T('→ Blanket mortgage (lower of LTV / DSCR)','→ Hipoteca global (menor de LTV / DSCR)')+'</span><span class="result-num">'+fmt(mort)+'</span></div>'+
    '<div class="result-row"><span>'+T('Total share equity','Capital de acciones total')+' ('+numU+' × '+fmt(sv)+')</span><span class="result-num">('+fmt(totalShares)+')</span></div>'+
    '<div class="result-row '+(gap>0?'gap':'surplus')+'"><span>'+T('Remaining gap (subsidy needed)','Brecha restante (subsidio necesario)')+'</span><span class="result-num">'+fmt(gap)+'</span></div>'+
    '</div><div class="result-section"><h5>'+T('Monthly member economics','Economía mensual del miembro')+'</h5>'+
    '<div class="result-row"><span>'+T('Monthly carrying charge (building share)','Cuota mensual del edificio')+'</span><span class="result-num" style="color:'+cc+'">'+fmt(carry)+'/mo</span></div>'+
    '<div class="result-row"><span>'+T('Share loan payment','Pago del préstamo de acción')+(amort?'':' ('+T('interest-only','solo interés)')+'')+'</span><span class="result-num">'+fmt(shareMo)+'/mo</span></div>'+
    '<div class="result-row total"><span>'+T('Total monthly cost (co-op)','Costo mensual total (cooperativa)')+'</span><span class="result-num" style="font-size:15px">'+fmt(totalMo)+'/mo</span></div>'+
    '<div class="result-row"><span>'+T('Status quo rent (current)','Renta actual (status quo)')+'</span><span class="result-num">'+fmt(currRent)+'/mo</span></div>'+
    '<div class="result-row '+(totalMo<=currRent?'surplus':'gap')+'"><span>'+T('Difference vs. rent','Diferencia vs. renta')+'</span><span class="result-num">'+(totalMo<=currRent?'−':'+')+fmt(Math.abs(totalMo-currRent))+'/mo</span></div>'+
    '</div><div class="result-section"><h5>'+T('Operating pro forma (annual)','Pro forma operativo (anual)')+'</h5>'+
    '<div class="result-row"><span>'+T('Blanket mortgage debt service','Servicio de deuda hipotecaria')+'</span><span class="result-num">'+fmt(annDebt)+'/yr</span></div>'+
    '<div class="result-row"><span>'+T('Replacement reserve','Reserva de reemplazo')+'</span><span class="result-num">'+fmt(res)+'/yr</span></div>'+
    '<div class="result-row"><span>'+T('Common area utilities','Servicios áreas comunes')+'</span><span class="result-num">'+fmt(utilities)+'/yr</span></div>'+
    '<div class="result-row"><span>'+T('Other ops + training','Otros costos + capacitación')+'</span><span class="result-num">'+fmt(ops+tyr)+'/yr</span></div>'+
    '<div class="result-row sub"><span>'+T('Total annual operating costs','Total costos operativos anuales')+'</span><span class="result-num">'+fmt(annDebt+annOps)+'/yr</span></div>'+
    '<div class="result-row"><span>'+T('Annual carrying charge increase','Aumento anual de la cuota')+'</span><span class="result-num">'+(cg*100).toFixed(1)+'%/yr</span></div>'+
    '</div><div class="result-section"><h5>'+T('Share & entry','Acción y entrada')+'</h5>'+
    '<div class="result-row"><span>'+T('Share value','Valor de la acción')+'</span><span class="result-num">'+fmt(sv)+'</span></div>'+
    '<div class="result-row"><span>'+T('Share loan type','Tipo de préstamo de acción')+'</span><span class="result-num">'+(amort?T('Amortizing','Amortizante'):T('Interest-only','Solo interés'))+'</span></div>'+
    '<div class="result-row"><span>'+T('Resale formula','Fórmula de reventa')+'</span><span class="result-num">'+rlab[resaleMode]+'</span></div>'+
    '<div class="result-row"><span>'+T('Projected share value (yr 10)','Valor proyectado (año 10)')+'</span><span class="result-num">'+fmt(yr10)+'</span></div>'+
    '</div><div class="result-section"><h5>'+T('One-time costs','Costos únicos')+'</h5>'+
    '<div class="result-row"><span>'+T('Org. & legal','Organización y legal')+'</span><span class="result-num">'+fmt(org)+'</span></div>'+
    '<div class="result-row"><span>'+T('Upfront training','Capacitación inicial')+'</span><span class="result-num">'+fmt(tup)+'</span></div>'+
    '<div class="result-row total"><span>'+T('Total one-time','Total únicos')+'</span><span class="result-num">'+fmt(org+tup)+'</span></div>'+
    '</div><p class="text-sm">'+T('Share loans: Resurrection Project, CCLT. Carrying charge replaces rent and covers all building expenses. Blanket mortgage constrained by lower of LTV / DSCR.','Préstamos de acciones: Resurrection Project, CCLT. La cuota mensual reemplaza la renta e incluye todos los gastos del edificio.')+'</p></div>';
  drawCharts(currRent,rg,carry,cg,shareMo,sv,sr,st,amort);
}

function drawCharts(currRent,rg,carry,cg,shareMo,sv,sr,st,amort){
  var yrs=Array.from({length:21},function(_,i){return i;});
  var coopC=yrs.map(function(y){
    var sm=shareMo;
    if(!amort&&y*12>=st)sm=0;
    var carryY=carry*Math.pow(1+cg,y);
    return Math.round(carryY+sm);
  });
  var rentC=yrs.map(function(y){return Math.round(currRent*Math.pow(1+rg,y));});
  var cCtx=document.getElementById('costChart'); if(!cCtx)return;
  if(cCost){cCost.destroy();}
  cCost=new Chart(cCtx.getContext('2d'),{
    type:'line',
    data:{labels:yrs.map(function(y){return 'Yr '+y;}),datasets:[
      {label:T('Co-op','Coop'),data:coopC,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,.07)',tension:.3,borderWidth:2,pointRadius:2},
      {label:T('Rent','Renta'),data:rentC,borderColor:'#D85A30',backgroundColor:'rgba(216,90,48,.05)',tension:.3,borderWidth:2,borderDash:[5,3],pointRadius:2}
    ]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return '$'+Math.round(c.parsed.y).toLocaleString()+'/mo';}}}},scales:{y:{ticks:{callback:function(v){return '$'+v.toLocaleString();}},grid:{color:'#f0ede8'}},x:{grid:{display:false}}}}
  });
  var sgross=yrs.map(function(y){return Math.round(shareAtYr(sv,y));});
  var snet=yrs.map(function(y){
    var g=shareAtYr(sv,y);
    var bal=amort?Math.max(0,loanBal(sr,st,sv,y*12)):(y*12>=st?0:sv);
    return Math.round(Math.max(0,g-bal));
  });
  var sCtx=document.getElementById('shareChart'); if(!sCtx)return;
  if(cShare){cShare.destroy();}
  cShare=new Chart(sCtx.getContext('2d'),{
    type:'line',
    data:{labels:yrs.map(function(y){return 'Yr '+y;}),datasets:[
      {label:T('Gross','Bruto'),data:sgross,borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,.07)',tension:.3,borderWidth:2,pointRadius:2},
      {label:T('Net','Neto'),data:snet,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,.1)',tension:.3,borderWidth:2,fill:true,pointRadius:2}
    ]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return '$'+Math.round(c.parsed.y).toLocaleString();}}}},scales:{y:{ticks:{callback:function(v){return '$'+v.toLocaleString();}},grid:{color:'#f0ede8'}},x:{grid:{display:false}}}}
  });
}

// INIT
window.addEventListener('load',function(){
  document.querySelectorAll('.es').forEach(function(e){e.style.display='none';});
  updateBenchNote(); renderResaleInputs();
  setProg('606',document.querySelector('#program-group .btn-opt.active'));
  calcF(); calcC();
  selNbhd('logan',document.querySelector('.nbhd-card.active'));
});
</script>
